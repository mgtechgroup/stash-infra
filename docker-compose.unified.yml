# Consolidated Stack: Stash + UniScrape + Whisparr + Infrastructure
# Production-grade with security hardening, resource limits, health checks
# Date: 2026-05-04
# Fixed: Pinned image tags, network segmentation (blb-frontend/backend/data)

services:

  # ============================================
  # CORE SERVICES
  # ============================================

  # Stash Media Manager & Library (using hotio nightly build)
  stash:
    image: ghcr.io/hotio/stash:nightly-01a7583364b97478dd582826fdfe9bff96c0ce97
    container_name: stash
    restart: unless-stopped
    hostname: stash
    ports:
      - "9999:9999"
    environment:
      STASH_STASH: /data
      STASH_GENERATED: /generated
      STASH_METADATA: /metadata
      STASH_CACHE: /cache
      STASH_BLOBS: /blobs
      STASH_PORT: "9999"
    volumes:
      - stash_config:/root/.stash:rw
      - stash_data:/data:rw
      - stash_metadata:/metadata:rw
      - stash_cache:/cache:rw
      - stash_blobs:/blobs:rw
      - stash_generated:/generated:rw
      - stash_scrapers:/scrapers:ro
    networks:
      - blb-backend
      - blb-data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9999"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777
      - /var/run:size=64M,mode=1777

  # UniScrape Universal Scraper API
  uniscrape:
    build:
      context: ./UniversalScraper/docker
      dockerfile: Dockerfile
      cache_from:
        - type=gha
    image: ghcr.io/mgtechgroup/uniscrape:latest
    container_name: uniscrape
    restart: unless-stopped
    hostname: uniscrape
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chrome:
        condition: service_started
    ports:
      - "9876:8085"
    environment:
      PORT: "8085"
      NODE_ENV: production
      SCRAPERS_PATH: /scrapers
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CHROME_URL: http://chrome:9222
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - stash_scrapers:/scrapers:ro
      - uniscrape_cache:/app/cache:rw
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - blb-backend
      - blb-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777
      - /var/run:size=64M,mode=1777

  # Stash Namer - Automated Scene Naming/Organization
  namer:
    image: ghcr.io/theporndatabase/namer:1.12.0
    container_name: namer
    restart: unless-stopped
    hostname: namer
    depends_on:
      - stash
    ports:
      - "6980:6980"
    environment:
      PUID: "1001"
      PGID: "1000"
      TZ: ${TZ}
      NAMER_CONFIG: /config/namer.cfg
    volumes:
      - namer_config:/config:rw
      - stash_data:/data:rw
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - blb-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6980/api/healthcheck || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 45s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
      - /var/run:size=64M,mode=1777

  # Whisparr - Audio/Music Organizer (Pinned to ghcr.io)
  whisparr:
    image: ghcr.io/hotio/whisparr:5.0.0
    container_name: whisparr
    restart: unless-stopped
    hostname: whisparr
    ports:
      - "6969:6969"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - whisparr_config:/config:rw
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - blb-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
      - /var/run:size=64M,mode=1777

  # Open Liberty Java Application Server (Pinned version)
  liberty:
    image: icr.io/appcafe/open-liberty:24.0.0.12-kernel-slim-java17-openj9-ubi
    container_name: liberty
    restart: unless-stopped
    hostname: liberty
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9011:9011"
    environment:
      TZ: ${TZ}
      LANG: en_US.UTF-8
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseStringDeduplication"
      WLP_OUTPUT_DIR: /opt/ol/wlp/output
      DB_PASSWORD: ${LIBERTY_DB_PASSWORD}
    volumes:
      - ./open-liberty/server.xml:/opt/ol/configDropins/defaults/server.xml:ro
      - liberty_config:/opt/ol/wlp/usr:rw
      - liberty_output:/opt/ol/wlp/output:rw
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - blb-backend
      - blb-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777
      - /var/run:size=64M,mode=1777

  # IMDB Scraper - Movie/TV Series Web Scraper with REST API
  imdb-scraper:
    build:
      context: ../repos/scrape/imdb-scraper
      dockerfile: Dockerfile
    image: mgtechgroup/imdb-scraper:latest
    container_name: imdb-scraper
    restart: unless-stopped
    hostname: imdb-scraper
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NODE_OPTIONS: "--max-old-space-size=512"
      NIGHTMARE_ELECTRON_PATH: /usr/bin/chromium-browser
    volumes:
      - imdb_data:/app/posters:rw
      - imdb_logs:/app/logs:rw
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - blb-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 45s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777
      - /var/run:size=64M,mode=1777

  # ============================================
  # INFRASTRUCTURE & DEPENDENCIES
  # ============================================

  # PostgreSQL Database (Uniscrape, metadata)
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - blb-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777
      - /var/run/postgresql:size=64M,mode=0755

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    hostname: redis
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data:rw
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
      - ./redis/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
    networks:
      - blb-data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -u redis://:${REDIS_PASSWORD}@localhost:6379 incr ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
      - /var/run:size=64M,mode=1777

  # Chromium/Chrome Headless (CDP for advanced scraping) - Pinned to version 131
  chrome:
    image: chromedp/headless-shell:131
    container_name: chrome
    restart: unless-stopped
    hostname: chrome
    ports:
      - "9222:9222"
    environment:
      CHROMIUM_ARGS: "--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage"
    volumes:
      - chrome_cache:/tmp/chrome:rw
    networks:
      - blb-backend
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    tmpfs:
      - /tmp:size=1G,mode=1777
      - /dev/shm:size=1G,mode=1777

  # Nginx Reverse Proxy + SSL Termination
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    hostname: nginx
    depends_on:
      - stash
      - uniscrape
      - whisparr
      - liberty
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - blb-frontend
      - blb-backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /var/run:size=64M,mode=1777
      - /var/cache/nginx:size=256M,mode=1777
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  # Transmission DHT/Torrent Client (Optional) - Pinned to 4.0.5
  transmission:
    image: linuxserver/transmission:4.0.5
    container_name: transmission
    restart: unless-stopped
    hostname: transmission
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ}
      TRANSMISSION_WEB_HOME: /transmission-web-control/
    volumes:
      - transmission_config:/config:rw
      - transmission_downloads:/downloads:rw
    networks:
      - blb-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
      - /var/run:size=64M,mode=1777

  # ============================================
  # STREMIO SERVICES (Internal Only)
  # ============================================

  # Stremio Server - Media Streaming Backend
  stremio-server:
    image: ghcr.io/stremio/stremio-server:4.4.168
    container_name: stremio-server
    restart: unless-stopped
    hostname: stremio-server
    expose:
      - "11470"
    environment:
      NODE_ENV: production
      PORT: "11470"
      STREMIO_API: http://stremio-addons:7000
    networks:
      - blb-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11470/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777
      - /var/run:size=64M,mode=1777

  # Stremio Addons - Community Addon Aggregator
  stremio-addons:
    image: ghcr.io/stremio/addons:latest
    container_name: stremio-addons
    restart: unless-stopped
    hostname: stremio-addons
    expose:
      - "7000"
    environment:
      NODE_ENV: production
      PORT: "7000"
      ADDON_LIST: "https://github.com/Stremio/stremio-addons/blob/master/addonsList.md"
    networks:
      - blb-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
      - /var/run:size=64M,mode=1777

  # Stremio Web - Browser-based UI
  stremio-web:
    image: ghcr.io/stremio/stremio-web:4.4.168
    container_name: stremio-web
    restart: unless-stopped
    hostname: stremio-web
    expose:
      - "8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      STREMIO_SERVER: http://stremio-server:11470
    networks:
      - blb-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
      - /var/run:size=64M,mode=1777

volumes:
  # Stash
  stash_config:
    driver: local
  stash_data:
    driver: local
  stash_metadata:
    driver: local
  stash_cache:
    driver: local
  stash_blobs:
    driver: local
  stash_generated:
    driver: local
  stash_scrapers:
    driver: local

  # UniScrape
  uniscrape_cache:
    driver: local

  # Whisparr
  whisparr_config:
    driver: local

  # Namer
  namer_config:
    driver: local

  # Open Liberty
  liberty_config:
    driver: local
  liberty_output:
    driver: local

  # IMDB Scraper
  imdb_data:
    driver: local
  imdb_logs:
    driver: local

  # Infrastructure
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chrome_cache:
    driver: local
  nginx_cache:
    driver: local

  # Transmission
  transmission_config:
    driver: local
  transmission_downloads:
    driver: local

  # Stremio
  stremio_server_data:
    driver: local
  stremio_addons_data:
    driver: local
  stremio_web_data:
    driver: local

networks:
  blb-frontend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-blb-frontend
      com.docker.driver.mtu: 1500
    ipam:
      config:
        - subnet: 172.21.0.0/16

  blb-backend:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-blb-backend
      com.docker.driver.mtu: 1500
    ipam:
      config:
        - subnet: 172.22.0.0/16

  blb-data:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-blb-data
      com.docker.driver.mtu: 1500
    ipam:
      config:
        - subnet: 172.23.0.0/16

# Usage:
# docker compose -f docker-compose.unified.yml up -d
# docker compose -f docker-compose.unified.yml logs -f
# docker compose -f docker-compose.unified.yml ps
