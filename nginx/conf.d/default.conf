upstream stash {
    server stash:9999;
}

upstream uniscrape {
    server uniscrape:8085;
}

upstream whisparr {
    server whisparr:6969;
}

upstream liberty {
    server liberty:9080;
}

upstream imdb-scraper {
    server imdb-scraper:3000;
}

upstream transmission {
    server transmission:9091;
}

server {
    listen 80;
    server_name blbgensixai.club *.blbgensixai.club localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blbgensixai.club *.blbgensixai.club localhost;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /stash/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://stash/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /uniscrape/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://uniscrape/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location /whisparr/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://whisparr/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location /liberty/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://liberty/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location /imdb/ {
        limit_req zone=scraper burst=5 nodelay;
        proxy_pass http://imdb-scraper/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location /torrent/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://transmission/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
